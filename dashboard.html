<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

<!-- Sidebar -->
<div class="sidebar">
<h2>LearnHub</h2>

<ul>
<li class="active">Dashboard</li>
<li>My Courses</li>
<li>Assignments</li>
<li>Analytics</li>
<li>Settings</li>
</ul>
</div>

<!-- Main Content -->
<div class="main">

<h1>Welcome Back 👋</h1>

<div class="dashboard-cards">

<div class="dash-card">
<h3>Enrolled Courses</h3>
<p>5</p>
</div>

<div class="dash-card">
<h3>Completed</h3>
<p>2</p>
</div>

<div class="dash-card">
<h3>Pending</h3>
<p>3</p>
</div>

</div>

<h2>Your Courses</h2>

<div class="course-grid">

<div class="course-card">
<h3>Frontend Development</h3>
<p>Progress: 60%</p>
<div class="progress">
<div style="width:60%"></div>
</div>
</div>

<div class="course-card">
<h3>DSA</h3>
<p>Progress: 30%</p>
<div class="progress">
<div style="width:30%"></div>
</div>
</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
