<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- Sidebar -->
<aside class="sidebar glass">

<h2>LearnHub</h2>

<ul>
<li class="active">🏠 Dashboard</li>
<li>📚 Courses</li>
<li>📝 Assignments</li>
<li>📊 Analytics</li>
<li>⚙ Settings</li>
</ul>

</aside>

<!-- Main -->
<main class="main">

<header class="topbar">
<h1>Dashboard</h1>
<button id="themeToggle">🌙</button>
</header>

<div class="stats">

<div class="card glass">
<h3>Courses</h3>
<p>6</p>
</div>

<div class="card glass">
<h3>Completed</h3>
<p>3</p>
</div>

<div class="card glass">
<h3>Pending</h3>
<p>3</p>
</div>

</div>

<h2>Your Learning</h2>

<div class="course-grid">

<div class="course-card glass">
<h3>Frontend</h3>
<div class="progress">
<div style="width:70%"></div>
</div>
</div>

<div class="course-card glass">
<h3>DSA</h3>
<div class="progress">
<div style="width:40%"></div>
</div>
</div>

</div>

</main>

</div>

<script src="script.js"></script>
</body>
</html>
